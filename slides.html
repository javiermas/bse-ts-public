## What makes time series data different?

Let’s walk through an example: predicting student height vs predicting the average height over time

???
Contrast **many unrelated draws** (height across people today) vs **one evolving system** (average height path driven by a trend).
For height, taking an average can be a good predictor. This is because the sample average is an unbiased estimator of the population mean.
For time series applications, taking an average is not a good predictor. This is because the observations are not i.i.d.:
the distribution of the average height is ever-changing.

## Time Series Patterns

* **Trend:** underlying change over the long-term.
    * Example: company growth.
* **Seasonality:** recurrent patterns of similar length.
    * Example: orders within the day.
* **Cycles:** patterns of indeterminate length.
    * Example: product hype or economic crisis.
* **Outliers:** could be considered seasonality or cycles

# Time series models

---
layout: false


## Time series models

Every forecasting model answers the same question: **given what I know up to time $t$, what is my best guess for $y_{t+h}$?**

The models differ in *what they use* and *how they combine it*:

| Model family | What it uses |
|---|---|
| Naive | Simple heuristics (last value, mean) |
| Linear regression | Features you engineer |
| ARIMA | Past values and past errors |
| Exponential smoothing | Weighted recent observations, adaptively |
| Boosting / trees | Features, non-linearly |
| Deep learning | Sequences, end-to-end |

# Naive heuristics

---
layout: false

## Naive heuristics

**Last value**

<div>$$\hat{y}_{t+1|t} = y_t $$</div>

This is the **random walk** forecast. It is optimal when the series has no predictable component beyond its current level — increments are independent and identically distributed.

**Sample mean**

<div>$$\hat{y}_{t+h|t} = \bar{y} = \frac{1}{T} \sum_{t=1}^{T} y_t $$</div>

Works when the mean doesn't change significantly within your forecast horizon.

???
The mean is the maximum-likelihood forecast for a white-noise series. 

---

## Naive heuristics

- Both the last value and historical mean can be made seasonal by taking *groupby* versions of it (e.g. mean by hour of the day) 
- In any real ML application, naive heuristics should always go your first go-to model. The baseline you try to beat with more complex models.

# Linear regression

---
layout: false


## Linear regression on time series

Auto-regressive model:
<div>$$y_t = c + \phi_1 y_{t-1} + \varepsilon_t$$</div>

Deterministic trend:
<div>$$y_t = c + \beta t + \phi_1 y_{t-1} + \varepsilon_t$$</div>

Seasonal dummies:
<div>$$y_t = c + \sum_{s=1}^{S-1} \alpha_s D_{s,t} + \phi_1 y_{t-1} + \varepsilon_t$$</div>


???
The constant $c$ sets the **unconditional mean**. For a stationary AR(1): $E[y_t] = \dfrac{c}{1 - \phi_1}$.

Without it, the model forces mean-reversion to zero—fine if your series is already mean-zero, wrong otherwise.

Use when: the series fluctuates around a stable non-zero level (e.g. temperature anomalies, capacity utilization).

## Why OLS gives wrong answers on autoregressive models

OLS requires regressors to be uncorrelated with the error. 
For: 
<div>$$y_t = c + \phi_1 y_{t-1} + \varepsilon_t $$</div>
OLS requires: 
<div>$$\text{Cov}(y_{t-1},\, \varepsilon_t) = 0$$</div>

This fails when errors are autocorrelated. 

---

## Why OLS gives wrong answers on autoregressive models

Example: Glovo orders spike at 21:00 (Spanish dinner time) then dip at 21:05.

.fit-slide[
![Orders vs expected intraday](figures/orders-vs-expected-intraday.png)
]

* **Incorrect coefficient estimates** — AR is used to capture one-step shocks, which leads to biased parameters.
* **Incorrect confidence intervals** — OLS CIs assume i.i.d. errors; 
with autocorrelated errors they are too narrow.


---

## AR(1) vs MA(1): persistence vs one-step echo

.fit-slide[
![AR(1) vs MA(1)](figures/ar1-vs-ma1.png)
]

???
AR(1): the series has long memory — a shock today is still visible many steps later, and the ACF reflects that with a slow geometric decay. MA(1): the series forgets immediately after one step. The ACF has exactly one non-zero spike and then nothing, because after lag 1 there are no shared shocks between $y_t$ and $y_{t-h}$.

# ARIMA

---
layout: false

## ARIMA($p$, $d$, $q$) specification

Auto-regressive (AR) Integrated (I) Moving Average (MA)

Taking ARIMA(1,0,1) - often referred to as an ARMA(1,1) model - as an example:

<div>$$y_t = \alpha + \underbrace{\phi y_{t-1}}_{\text{AR}(1)} + \underbrace{\theta \varepsilon_{t-1}}_{\text{MA}(1)} + \varepsilon_t $$</div>

The d or I parameter represents how many differences are applied to the raw time series before modelling as above (we'll see why this is done soon). For $d=1$:

<div>$$y_t = y^{raw}_t - y^{raw}_{t-1}$$</div>

---
## ARIMA($p$, $d$, $q$) specification (cont.)

* **$p$** — AR order: lags of $\Delta^d y_t$ included. Requires $|\phi_i| < 1$.
* **$d$** — Integration order: how many times to difference. Usually 0 or 1.
* **$q$** — MA order: lags of past errors included. Requires $|\theta_j| < 1$.

Cannot be estimated with OLS because of the MA component. Instead, it's estimated using MLE.

**Important**: the time series we apply an ARMA($p$, $q$) to needs to be *stationary*.


---

## Stationarity

A stationary time series is a stochastic process whose statistical properties (like mean, variance, autocorrelation) 
are constant over time. That is, a time series in a steady state.

---

## Formal definition

**Weak stationarity** — the most relevant:

<div>$$E[y_t] = \mu \quad \text{for all } t$$</div>
<div>$$\text{Var}(y_t) = \sigma^2 < \infty \quad \text{for all } t$$</div>
<div>$$\text{Cov}(y_t,\, y_{t-h}) = \gamma(h) \quad \text{(depends on lag } h \text{, not on } t\text{)}$$</div>

Constant mean, constant variance, and autocorrelations that depend only on *how far apart* two observations are—not on *when* they occur.

---

## Formal definition (continued)

**Strong stationarity:** the joint distribution is time-invariant for any collection of time points:

<div>$$(y_{t_1}, \ldots, y_{t_k}) \overset{d}{=} (y_{t_1+h}, \ldots, y_{t_k+h})$$</div>

for all $k$, all $(t_1, \ldots, t_k)$, and all shifts $h$.

## Before fitting anything: a quick visual check

Plot the series and ask three questions:

1. **Does the mean look stable?** — or does it trend up or down?
2. **Does the variance look stable?** — or does the spread widen over time?
3. **Are segments from different periods exchangeable?** — could you tell 2021 from 2023 by eye?

"No" $\rightarrow$ non-stationary, an ARMA model will fail if you don't adress it.

Formal tests exist (ADF, KPSS) but visual inspection and domain knowledge is usually preferred.

---

## Forecast error metrics

With truth $y_t$ and point forecast $\widehat y_t$ over a test window of $n$ steps:

<div>$$\text{MAE} = \frac{1}{n}\sum|y_t - \hat y_t| \qquad \text{RMSE} = \left(\frac{1}{n}\sum(y_t - \hat y_t)^2\right)^{\!1/2}$$</div>

* In the same units as $y$. 
* **RMSE** penalises large errors more (squares before averaging). 
* Neither works across series of different magnitudes.


???
Root version used for reporting purposes.

---

## Forecast error metrics continued

With truth $y_t$ and point forecast $\widehat y_t$ over a test window of $n$ steps:

<div>$$\text{MAPE} = \frac{1}{n}\sum\left|\frac{y_t - \widehat y_t}{y_t}\right| 
  \qquad \text{SMAPE} = \frac{1}{n}\sum\frac{|y_t - \widehat y_t|}{(|y_t|+|\widehat y_t|)/2}$$</div>

* **MAPE** — scale-free, easy to report ("6% off on average"). Breaks when $y_t \approx 0$, and systematically rewards **under-forecasting**.
* **SMAPE** — bounded in $[0, 2]$, handles near-zeros better. Still has an under-forecasting bias; less interpretable than MAPE.
* **MASE** — scales MAE by the in-sample MAE of a seasonal-naïve forecast. Fully scale-free, no zero problems, the safest choice when comparing across many series.

???
Under-forecasting bias in MAPE: the denominator is the actual value y_t, so errors on low-demand periods are amplified — the optimiser learns to sit slightly below the mean to minimise total loss.

MASE denominator: average absolute error of the seasonal-naïve forecast on the training set (lag-s differences), where s is the seasonal period. If MASE < 1 your model beats seasonal naïve; if MASE > 1 you should just use seasonal naïve.

---
## Picking a champion

Backtesting gives you a **performance matrix**: one error per model per backtest window (e.g. one row per week). Selecting a champion means aggregating that matrix into a single ranking.

| Aggregation | Implicit assumption |
|---|---|
| Mean across all windows | Model performance is stationary |
| Exponentially weighted mean | Recent windows predict future performance better |
| Best performer in the same period last year | Strong seasonality dominates; August 2024 predicts August 2025 |

**Treat it as a predictive task:** given past errors, which model will have the lowest error next period?


???
EWM: downweight old windows using a decay factor. The implicit assumption is that the series has changed — a model that was best 18 months ago may no longer be.
Seasonal selector: requires at least 2–3 years of backtest history to have meaningful same-period comparisons. On shorter histories, the variance dominates and you're just picking noise.
These strategies can be combined: use EWM in normal periods, switch to seasonal selector when entering a known anomalous period.
Also worth noting: with enough models and windows, champion selection is itself a modelling problem — you can train a meta-learner on past performance features to predict next-period rank. This is the entry point to ensembles.

---

## Model iteration

* Performance >> statistical tests
* Beware of data leaks
* Check performance on every iteration, ‘too good to be true’ performance.

# SARIMA

---
layout: false

## SARIMA(p,d,q)(P,D,Q)[S] specification

Seasonal ARIMA — same structure as ARIMA but with an additional seasonal layer.

Taking SARIMA(1,0,0)(1,0,0)[24] as an example:

<div>$$y_t = \underbrace{\phi\, y_{t-1}}_{\text{AR}(1)} + \underbrace{\Phi\, y_{t-24}}_{\text{SAR}(1)} + \underbrace{-\phi\Phi\, y_{t-25}}_{\text{interaction}} + \varepsilon_t$$</div>

The seasonal difference ($D=1$, $S=24$) removes a drifting seasonal pattern:

<div>$$y_t = y_t^{raw} - y_{t-24}^{raw}$$</div>

---

## SARIMA(p,d,q)(P,D,Q)[S] specification (cont.)

* **p, d, q** — same as ARIMA: short-run AR, differencing, MA.
* **P** — Seasonal AR order: lags $y_{t-kS}$ for k = 1, ..., P
* **D** — Seasonal differencing: removes a drifting seasonal pattern. Usually 0 or 1.
* **Q** — Seasonal MA order: past errors up to $\varepsilon_{t-kS}$ for k = 1, ..., Q
* **S** — Seasonal period: 24 (hourly), 7 (daily), 12 (monthly).

???
The interaction term -phi*Phi*y_{t-25} arises from multiplying out the AR and SAR polynomials.
It's not a free parameter — it's constrained to equal -phi*Phi. This is what makes SARIMA
parsimonious: a few parameters generate a rich lag structure.

Practical defaults: SARIMA(1,1,1)(1,1,1)[S] is often a good starting point.
D=1 when the seasonal pattern visibly drifts year over year; D=0 when it's stable.

# Exponential smoothing and the Theta model

---
layout: false

## Exponential smoothing

Instead of averaging all past observations equally, weight them so that **recent observations matter more**.

**Simple exponential smoothing (SES):**

<div>$$\hat{y}_{t+1|t} = \alpha\, y_t + (1-\alpha)\, \hat{y}_{t|t-1}, \qquad \alpha \in (0, 1)$$</div>

Expanding the recursion:

<div>$$\hat{y}_{t+1|t} = \alpha \sum_{k=0}^{\infty} (1-\alpha)^k\, y_{t-k}$$</div>

Weight on $y_{t-k}$ decays geometrically — older observations contribute less.

???
SES is good for stationary-ish data with no trend or seasonality.

---

## The Theta model

The theta model was formulated in 2000, when it wont the M3 competition (Asimakis & Nikolopoulos (2000)). 
**Hyndman & Billah (2003)** showed it model is equivalent to **SES with drift**:

<div>$$\hat{y}_{t+h} = \hat{y}_{t+h}^{\text{SES}} + \frac{\hat{b}}{2}\cdot h$$</div>

where $\hat{b}$ is the OLS slope of $y_t$ on $t$. SES tracks the recent level; the drift corrects for the long-run direction.
It works really well, but you need to remove the seasonal component from the TS first.

# Boosting methods for time series

---
layout: false

## Gradient boosting sees a table, not a series

Gradient boosting has no notion of time. It sees rows of $(x, y)$ pairs and fits residuals. 
The entire job of the practitioner is building the feature matrix.

<div>$$\widehat{y}_{t+h} = f\!\left(\underbrace{y_{t},\, y_{t-1}}_{\text{lag features}},\
  \underbrace{\bar{y}_t,\, \sigma_t}_{\text{rolling features}},\
  \underbrace{h_t,\, d_t}_{\text{calendar}},\ \underbrace{x_t}_{\text{exogenous}}\right)$$</div>

---

## Requirements for Gradient boosting for TS 

* **Trends also matter** — trees predict by averaging leaf values
and cannot extrapolate beyond the training range. Detrend before fitting.
* **Seasonality is adressed via features** — encode it as calendar features (hour of day, day of week).
Seasonal differencing might be necessary.
* **Horizon $h$** — only lags $\geq h$ are valid at prediction time to avoid leakage.

<div>$$h_t = \sigma(W_h\, h_{t-1} + W_x\, x_t + b), \qquad \hat{y}_t = W_y\, h_t$$</div>

The same weights are reused at every step. Each cell holds two matrices: $W_x \in \mathbb{R}^{d \times p}$ (input → hidden) and $W_h \in \mathbb{R}^{d \times d}$ (hidden → hidden), where $p$ is the number of input features and $d$ is the hidden size (a hyperparameter).

---

## Limitations of BPTT

**Vanishing gradients.** The gradient from $k$ steps back scales as $\|W_h\|^k$. For $\|W_h\| < 1$ it decays to zero — $W_h$ receives no update from distant steps.

$h_t$ sees the entire history $x_1, \ldots, x_t$ in the forward pass. But $W_h$ was never trained to encode long-range dependencies because the gradient never arrived. The network *sees* the distant past; it never *learns* from it.

In practice, dependencies beyond ~20 steps are not learned.


???
The vanishing gradient is not a training trick failure — it is structural.
The same weight matrix applied repeatedly either contracts or expands the gradient signal geometrically.
Clipping handles explosion; nothing handles vanishing except architecture changes.

---

## Other recurrent architectures

* **LSTMs** and **GRUs** try to solve the vanishing gradient problem, but in practice
they also struggle to learn long-range dependencies.
* GRUs are simpler, easier to train than LSTMs, but both still require
**careful training and tuning**, can often have issues with exploding gradients.
* They can be useful because of their **flexibility**, but on standard TS tasks
they rarely outperform traditional methods.
* More recently, **State Space Models (SSMs)** have shown promising results in 
NLP tasks and remain an active area of research.

---

## Attention and Transformers

The core problem with RNNs and LSTMs: connecting position $t$ to position $t-k$ requires the gradient to travel through $k$ steps. **Attention** removes that path — it directly computes a weighted relationship between any two positions in one step.

For each position $t$, attention produces a query $q_t$; for every other position $s$ a key $k_s$ and value $v_s$:

<div>$$\text{Attention}(q_t, K, V) = \sum_s \underbrace{\frac{\exp(q_t \cdot k_s / \sqrt{d})}{\sum_{s'} \exp(q_t \cdot k_{s'} / \sqrt{d})}}_{\text{how much to attend to } s} \cdot v_s$$</div>

**The cost:** attention is $O(T^2)$ — every position attends to every other.

???
The $\sqrt{d}$ scaling prevents dot products from growing large and pushing softmax into saturation.

Key intuition: RNNs compress all history into a fixed-size vector — a bottleneck. Attention has no bottleneck; it reads the full sequence at once and learns which parts to focus on.

PatchTST treats patches of consecutive time steps as tokens (like ViT does for image patches). This is the most practically relevant transformer architecture for univariate TS today.

The output is a weighted average of all values — positions similar to the query get higher weight. No recurrence, no gradient path between positions.

**For time series:** the model can directly learn "May this year looks like May last year" without the gradient travelling 12 steps. This is why transformers handle seasonal patterns much better than LSTMs.

---

## Attention: the linear algebra

Given a sequence of $T$ inputs, stack them into $X \in \mathbb{R}^{T \times d}$. Three learned projection matrices produce queries, keys, and values:

<div>$$\begin{aligned} Q &= X W_Q \\ K &= X W_K \\ V &= X W_V \end{aligned} \qquad W_Q, W_K, W_V \in \mathbb{R}^{d \times d_k}$$</div>

Each row of $Q$, $K$, $V$ is one position's query, key, or value vector. The full attention output is then:

<div>$$\text{Attention}(Q, K, V) = \underbrace{\text{softmax}\!\left(\frac{Q K^\top}{\sqrt{d_k}}\right)}_{\text{attention matrix } A \in \mathbb{R}^{T \times T}} V$$</div>


???
$d_k$ is the key/query dimension, often set to $d / \text{num\_heads}$ in multi-head attention.

The $\sqrt{d_k}$ scaling: without it, dot products grow large as $d_k$ increases, pushing softmax into near-zero gradient regions (saturation). Dividing by $\sqrt{d_k}$ keeps the variance of $q \cdot k$ roughly constant regardless of dimension.

Multi-head attention runs $h$ independent attention operations in parallel with smaller $d_k$, then concatenates — each head can attend to different aspects of the sequence simultaneously.

# Contraint-based optimization

---
layout: false


## Constraint-based optimization (CBO)

**Why constraint-based optimization?**
* Forecasts tell you what might happen
* CBO helps you automate decisions with those forecasts
* Common use cases: staffing, routing, inventory, energy, marketing budgets

---

## Optimisation is always the same problem

Every method you know is minimising a loss over decision variables:

| Method | Decision variables | Loss | Solver |
|---|---|---|---|
| Least squares | weights $\beta$ | $\lVert y - X\beta \rVert^2$ | closed form |
| Neural network | weights $W$ | MSE / cross-entropy | SGD |
| CBO | staff, inventory, schedules | cost function | LP / MILP / NLP solver |

What changes is the *structure*: continuous vs integer variables, smooth vs non-smooth loss, unconstrained vs hard constraints.

Gradient-based solvers require a smooth differentiable loss — they break on integer variables and hard constraints. MILP solvers are designed exactly for that case.

---

## Constraint-based optimization solvers

The general form of a CBO problem:

<div>$$\begin{aligned} \min_{x} \quad & f(x) \\ \text{subject to} \quad & g_i(x) \leq 0 \\ & h_j(x) = 0 \\ & x \in \mathcal{X} \end{aligned}$$</div>

where $x$ are the decision variables, $f$ is the cost function, $g_i$ are inequality constraints, $h_j$ are equality constraints, and $\mathcal{X}$ encodes variable bounds and integrality.

---

## Constraint-based optimization solvers

What changes across solver families is the structure of $f$, $g_i$, $h_j$, and $\mathcal{X}$:

* **Linear Programming (LP):** $f$ and all constraints linear in $x$, $x \in \mathbb{R}^n$
* **Mixed-Integer Linear Programming (MILP):** same as LP but some $x_i \in \mathbb{Z}$
* **Nonlinear Programming (NLP):** $f$ or constraints non-linear — avoid if possible
